<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日三餐记录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 未登录：显示登录/注册 -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-card card">
      <h1>🍽️ 每日三餐记录</h1>
      <div class="auth-tabs">
        <button type="button" class="auth-tab active" data-tab="login">登录</button>
        <button type="button" class="auth-tab" data-tab="register">注册</button>
      </div>
      <form id="formLogin" class="auth-form">
        <div class="form-row">
          <label>用户名</label>
          <input type="text" id="loginName" placeholder="请输入用户名" required />
        </div>
        <div class="form-row">
          <label>密码</label>
          <input type="password" id="loginPassword" placeholder="请输入密码" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block">登录</button>
      </form>
      <form id="formRegister" class="auth-form hidden">
        <div class="form-row">
          <label>头像</label>
          <div id="avatarPickerRegister" class="avatar-picker"></div>
        </div>
        <div class="form-row">
          <label>用户名</label>
          <input type="text" id="registerName" placeholder="请输入用户名" required />
        </div>
        <div class="form-row">
          <label>密码</label>
          <input type="password" id="registerPassword" placeholder="至少 4 位" required minlength="4" />
        </div>
        <button type="submit" class="btn btn-primary btn-block">注册</button>
      </form>
    </div>
  </div>

  <!-- 已登录：主应用 -->
  <div id="appScreen" class="app hidden">
    <aside class="sidebar">
      <div class="sidebar-current">
        <span class="avatar-wrap" id="currentUserAvatar">🍳</span>
        <span class="user-name" id="currentUserName">—</span>
      </div>
      <button type="button" class="btn btn-ghost btn-block" id="btnEditAvatar">更换头像</button>
      <button type="button" class="btn btn-ghost btn-block" id="btnAdminUsers" style="display:none;">用户管理</button>
      <button type="button" class="btn btn-ghost btn-block" id="btnLogout">退出登录</button>
    </aside>

    <div class="content">
      <header class="header">
        <h1>🍽️ 每日三餐记录</h1>
        <div class="header-actions">
          <input type="date" id="filterDate" class="input-date" title="添加记录默认日期" />
        </div>
      </header>

      <main class="main">
        <section class="add-card card">
          <h2>添加记录</h2>
          <form id="formAdd" class="form-add">
            <div class="form-row">
              <label>类型</label>
              <select id="mealType" required>
                <option value="breakfast">早餐</option>
                <option value="lunch">午餐</option>
                <option value="dinner">晚餐</option>
                <option value="snack">零食</option>
                <option value="late_night">夜宵</option>
              </select>
            </div>
            <div class="form-row">
              <label>吃了什么</label>
              <input type="text" id="foodDesc" placeholder="例如：牛肉面、奶茶、炸鸡..." />
            </div>
            <div class="form-row">
              <label>价格（元）</label>
              <input type="number" id="price" placeholder="0" min="0" step="0.01" required />
            </div>
            <div class="form-row">
              <label>评级</label>
              <div class="rating-options" id="ratingOptions">
                <label class="rating-item" data-rating="1"><input type="radio" name="rating" value="1" /> 夯</label>
                <label class="rating-item" data-rating="2"><input type="radio" name="rating" value="2" /> 顶级</label>
                <label class="rating-item" data-rating="3"><input type="radio" name="rating" value="3" /> 人上人</label>
                <label class="rating-item" data-rating="4"><input type="radio" name="rating" value="4" /> NPC</label>
                <label class="rating-item" data-rating="5"><input type="radio" name="rating" value="5" /> 拉完了</label>
              </div>
            </div>
            <div class="form-row">
              <label>评价（可选）</label>
              <textarea id="review" placeholder="好吃吗？有什么想说的..." rows="2"></textarea>
            </div>
            <div class="form-row">
              <label>图片（可选）</label>
              <input type="file" id="imageFile" accept="image/*" />
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">保存记录</button>
            </div>
          </form>
        </section>

        <section id="userViewSection" class="user-view-section">
          <div class="range-toolbar">
            <label>时间范围</label>
            <div class="range-btns">
              <button type="button" class="btn btn-ghost btn-range active" data-range="day">今日</button>
              <button type="button" class="btn btn-ghost btn-range" data-range="week">本周</button>
              <button type="button" class="btn btn-ghost btn-range" data-range="month">本月</button>
              <span class="range-custom">
                <input type="date" id="dateFrom" class="input-date small" />
                <span>至</span>
                <input type="date" id="dateTo" class="input-date small" />
              </span>
            </div>
          </div>
          <div class="overview-card card">
            <h2>概览</h2>
            <div id="overviewContent" class="overview-content"></div>
          </div>
          <div class="list-section">
            <h2>详情</h2>
            <div id="recordList" class="record-list"></div>
          </div>

          <section id="adminSection" class="admin-section card hidden">
            <h2>用户管理（管理员）</h2>
            <p id="adminUserCount" class="admin-user-count"></p>
            <div id="adminUserList" class="admin-user-list"></div>
          </section>
        </section>
      </main>
    </div>
  </div>

  <div id="modalEditAvatar" class="modal hidden">
    <div class="modal-content">
      <h3>更换头像</h3>
      <div id="avatarPickerEdit" class="avatar-picker"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="btnCancelAvatar">取消</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
